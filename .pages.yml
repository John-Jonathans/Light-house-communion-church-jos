media:
  folder: /
content:
  - name: settings
    label: Homepage
    type: file
    file: home.json
    fields:
      - name: hero_title
        label: Hero Title (Use <br/> for line breaks)
        type: string
  - name: blog
    label: The Bishop's Blog
    type: file
    file: blog.json
    fields:
      - name: posts
        label: Blog Posts
        type: list
        fields:
          - name: title
            label: Post Title
            type: string
          - name: date
            label: Date (e.g., April 18, 2026)
            type: string
          - name: author
            label: Author
            type: string
          - name: excerpt
            label: Short Preview/Excerpt
            type: text
          - name: content
            label: Full Post Content (Use Enter for new paragraphs)
            type: text
  - name: leadership
    label: The Bishop's Profile
    type: file
    file: leadership.json
    fields:
      - name: leader_name
        label: Name
        type: string
      - name: leader_title
        label: Title
        type: string
      - name: leader_image
        label: Profile Image
        type: image
      - name: leader_bio
        label: Biography
        type: text
  - name: library
    label: Library (Books)
    type: file
    file: books.json
    fields:
      - name: books
        label: Books
        type: list
        fields:
          - name: title
            label: Book Title
            type: string
          - name: author
            label: Author
            type: string
          - name: cover
            label: Cover Image
            type: image
  - name: events
    label: Events & Schedule
    type: file
    file: events.json
    fields:
      - name: schedule
        label: Weekly Schedule
        type: list
        fields:
          - name: day
            label: Day
            type: string
          - name: time
            label: Time
            type: string
          - name: title
            label: Title
            type: string
          - name: description
            label: Description
            type: text
          - name: icon
            label: Custom Icon (Optional)
            type: image
      - name: events
        label: Special Events
        type: list
        fields:
          - name: title
            label: Event Title
            type: string
          - name: date
            label: Date
            type: string
          - name: image
            label: Event Image
            type: image
          - name: description
            label: Description
            type: text