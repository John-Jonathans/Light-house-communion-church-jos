- name: about
    label: About Us
    type: file
    path: about.json
    fields:
      - name: mission_title
        label: Mission Headline
        type: string
      - name: mission_text
        label: Mission Text
        type: text
      - name: video_url
        label: YouTube Link
        type: string
      - name: activities
        label: Connect & Grow Activities
        type: list
        fields:
          - name: emoji
            label: Icon (Emoji)
            type: string
          - name: title
            label: Activity Title
            type: string
          - name: description
            label: Short Description
            type: string