media:
  folder: /
content:
  - name: settings
    label: Global Settings
    type: file
    file: home.json
    fields:
      - name: church_name
        label: Church Name
        type: string
      - name: main_headline
        label: Main Headline
        type: string
      - name: subheadline
        label: Subheadline
        type: string
      - name: background_image
        label: Background Image
        type: image
      - name: announcement
        label: Top Banner Text
        type: text
  - name: about
    label: About Us Page
    type: file
    file: about.json
    fields:
      - name: mission_title
        label: Mission Headline
        type: string
      - name: mission_text
        label: Mission Text
        type: text
      - name: video_url
        label: YouTube Link
        type: string
  - name: blog
    label: The Blog
    type: file
    file: blog.json
    fields:
      - name: posts
        label: Blog Posts
        type: list
        fields:
          - name: title
            label: Post Title
            type: string
          - name: date
            label: Date
            type: string
          - name: author
            label: Author
            type: string
          - name: excerpt
            label: Short Preview
            type: text
          - name: content
            label: Full Content
            type: text
  - name: leadership
    label: The Bishop
    type: file
    file: leadership.json
    fields:
      - name: leader_name
        label: Name
        type: string
      - name: leader_title
        label: Title
        type: string
      - name: leader_image
        label: Profile Image
        type: image
      - name: leader_bio
        label: Biography
        type: text
  - name: library
    label: Book Library
    type: file
    file: books.json
    fields:
      - name: books
        label: Books
        type: list
        fields:
          - name: title
            label: Title
            type: string
          - name: author
            label: Author
            type: string
          - name: cover
            label: Cover Image
            type: image
  - name: events
    label: Events
    type: file
    file: events.json
    fields:
      - name: schedule
        label: Weekly Schedule
        type: list
        fields:
          - name: day
            label: Day
            type: string
          - name: time
            label: Time
            type: string
          - name: title
            label: Title
            type: string
          - name: description
            label: Description
            type: text
          - name: icon
            label: Icon Image
            type: image
      - name: events
        label: Special Events
        type: list
        fields:
          - name: title
            label: Event Title
            type: string
          - name: date
            label: Date
            type: string
          - name: image
            label: Event Image
            type: image
          - name: description
            label: Description
            type: text