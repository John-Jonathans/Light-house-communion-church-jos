media: media
content:
  - name: settings
    label: Home
    type: file
    path: home.json
    fields:
      - name: church_name
        label: Church Name
        type: string
      - name: main_headline
        label: Main Headline
        type: string
      - name: subheadline
        label: Subheadline
        type: string
      - name: background_image
        label: Background Image
        type: image
      - name: announcement
        label: Top Banner Text
        type: text
  - name: about
    label: About Us
    type: file
    path: about.json
    fields:
      - name: mission_title
        label: Mission Headline
        type: string
      - name: mission_text
        label: Mission Text
        type: text
      - name: video_url
        label: YouTube Link
        type: string
      - name: activities
        label: Connect & Grow Activities
        type: object
        list: true
        fields:
          - name: emoji
            label: Icon (Emoji)
            type: string
          - name: title
            label: Activity Title
            type: string
          - name: description
            label: Short Description
            type: string
  - name: leadership
    label: The Bishop
    type: file
    path: bishop.json
    fields:
      - name: header_title
        label: Header Title
        type: string
      - name: header_subtitle
        label: Header Subtitle
        type: string
      - name: bishop_name
        label: Bishop's Name
        type: string
      - name: bishop_title
        label: Title (e.g., Senior Pastor)
        type: string
      - name: bio_heading
        label: Bio Heading
        type: string
      - name: bio_text
        label: Full Biography
        type: text
      - name: quote
        label: Highlight Quote
        type: text
      - name: facebook_link
        label: Facebook Page Link
        type: string
      - name: slider_images
        label: Gallery Photos
        type: object
        list: true
        fields:
          - name: photo
            label: Upload Photo
            type: image
  - name: events
    label: Events & Gatherings
    type: file
    path: events.json
    fields:
      - name: weekly_gatherings
        label: Weekly Gatherings
        type: object
        list: true
        fields:
          - name: day
            label: Day
            type: string
          - name: name
            label: Service Name
            type: string
          - name: time
            label: Time
            type: string
          - name: description
            label: Description
            type: text
      - name: special_events
        label: Special Events
        type: object
        list: true
        fields:
          - name: title
            label: Event Title
            type: string
          - name: date
            label: Date & Time
            type: string
          - name: description
            label: Description
            type: text
          - name: image
            label: Event Flyer
            type: image
  - name: blog
    label: The Blog
    type: file
    path: blog.json
    fields:
      - name: posts
        label: Blog Posts
        type: object
        list: true
        fields:
          - name: title
            label: Post Title
            type: string
          - name: date
            label: Date
            type: string
          - name: author
            label: Author
            type: string
          - name: excerpt
            label: Short Preview
            type: text
          - name: content
            label: Full Content
            type: text
  - name: give
    label: Giving & Donations
    type: file
    path: give.json
    fields:
      - name: title
        label: Headline
        type: string
      - name: message
        label: Giving Message
        type: text
      - name: payment_link
        label: Online Payment Link (Paystack/Flutterwave)
        type: string
      - name: bank_name
        label: Bank Name
        type: string
      - name: account_name
        label: Account Name
        type: string
      - name: account_number
        label: Account Number
        type: string