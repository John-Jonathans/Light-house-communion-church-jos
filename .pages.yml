media: media
content:
  - name: settings
    label: Home
    type: file
    path: home.json
    fields:
      - name: church_name
        label: Church Name
        type: string
      - name: main_headline
        label: Main Headline
        type: string
      - name: subheadline
        label: Subheadline
        type: string
      - name: background_image
        label: Background Image
        type: image
      - name: announcement
        label: Top Banner Text
        type: text
  - name: about
    label: About Us
    type: file
    path: about.json
    fields:
      - name: mission_title
        label: Mission Headline
        type: string
      - name: mission_text
        label: Mission Text
        type: text
      - name: video_url
        label: YouTube Link
        type: string
      - name: activities
        label: Connect & Grow Activities
        type: object
        list: true
        fields:
          - name: emoji
            label: Icon (Emoji)
            type: string
          - name: title
            label: Activity Title
            type: string
          - name: description
            label: Short Description
            type: string
  - name: events
    label: Events & Gatherings
    type: file
    path: events.json
    fields:
      - name: weekly_gatherings
        label: Weekly Gatherings
        type: object
        list: true
        fields:
          - name: day
            label: Day
            type: string
          - name: name
            label: Service Name
            type: string
          - name: time
            label: Time
            type: string
          - name: description
            label: Description
            type: text
      - name: special_events
        label: Special Events
        type: object
        list: true
        fields:
          - name: title
            label: Event Title
            type: string
          - name: date
            label: Date & Time
            type: string
          - name: description
            label: Description
            type: text
          - name: image
            label: Event Flyer
            type: image
  - name: blog
    label: The Blog
    type: file
    path: blog.json
    fields:
      - name: posts
        label: Blog Posts
        type: object
        list: true
        fields:
          - name: title
            label: Post Title
            type: string
          - name: date
            label: Date
            type: string
          - name: author
            label: Author
            type: string
          - name: excerpt
            label: Short Preview
            type: text
          - name: content
            label: Full Content
            type: text