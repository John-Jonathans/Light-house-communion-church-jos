<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Lighthouse - Home</title>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⛪</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <script>
        tailwind.config = { theme: { extend: { colors: { 'church-gold': '#FFD700', 'church-orange': '#6B21A8', 'church-dark': '#111827', }, fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Playfair Display', 'serif'], } } } }
    </script>

    <style>
        html { scroll-behavior: smooth; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.8s ease-out forwards; }
        
        .ticker-wrap { width: 100%; overflow: hidden; background-color: #111827; position: absolute; top: 0; left: 0; z-index: 60; }
        .ticker-content { display: inline-flex; white-space: nowrap; animation: ticker 30s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    </style>
</head>
<body class="bg-church-dark text-gray-800 antialiased font-sans flex flex-col min-h-screen m-0 p-0">

    <div id="announcement-banner" class="hidden ticker-wrap border-b border-gray-800">
        <div class="ticker-content">
            <span id="announcement-text-1" class="text-church-gold text-[10px] md:text-xs py-2 font-bold tracking-widest uppercase whitespace-pre"></span>
            <span id="announcement-text-2" class="text-church-gold text-[10px] md:text-xs py-2 font-bold tracking-widest uppercase whitespace-pre"></span>
        </div>
    </div>

    <nav id="navbar" class="fixed w-full z-50 transition-all duration-300 bg-transparent py-4 top-0">
        <div class="container mx-auto px-6 flex justify-between items-center">
            
            <a href="index.html" class="flex items-center gap-3 group relative z-50 hover:scale-105 transition-transform duration-300">
                <div class="w-10 h-10 flex-shrink-0 rounded-full overflow-hidden bg-church-dark flex items-center justify-center shadow-lg transition-colors border-2 border-church-gold/30">
                    <img src="logo.png" alt="Lighthouse Logo" class="w-full h-full object-cover scale-110" onerror="this.src='https://via.placeholder.com/150/111827/FFD700?text=L'" />
                </div>
                <span id="nav-logo-text" class="font-serif font-bold text-xl tracking-wide text-white">Lighthouse</span>
            </a>

            <div class="hidden lg:flex space-x-6 items-center">
                <a href="index.html" class="nav-link text-sm font-semibold tracking-wide text-white/90 hover:text-church-orange transition-colors">Home</a>
                <a href="about.html" class="nav-link text-sm font-semibold tracking-wide text-white/90 hover:text-church-orange transition-colors">About Us</a>
                <a href="leadership.html" class="nav-link text-sm font-semibold tracking-wide text-white/90 hover:text-church-orange transition-colors">The Bishop</a>
                <a href="books.html" class="nav-link text-sm font-semibold tracking-wide text-white/90 hover:text-church-orange transition-colors">Library</a>
                <a href="events.html" class="nav-link text-sm font-semibold tracking-wide text-white/90 hover:text-church-orange transition-colors">Events</a>
                <a href="blog.html" class="nav-link text-sm font-semibold tracking-wide text-white/90 hover:text-church-orange transition-colors">Blog</a>
                <a href="give.html" id="nav-btn" class="px-4 py-2 rounded-full text-sm font-bold transition-all bg-white text-church-orange hover:bg-gray-100 hover:shadow-lg hover:-translate-y-0.5">Give Now</a>
            </div>

            <button id="mobile-menu-btn" class="lg:hidden text-white focus:outline-none relative z-50">
                <svg id="menu-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="12" x2="20" y2="12"></line><line x1="4" y1="6" x2="20" y2="6"></line><line x1="4" y1="18" x2="20" y2="18"></line></svg>
                <svg id="close-icon" class="hidden text-gray-800" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>

        <div id="mobile-menu" class="hidden lg:hidden bg-white fixed inset-0 w-full h-screen z-40 flex-col justify-center items-center space-y-6 animate-fade-in">
            <a href="index.html" class="text-2xl font-serif text-gray-800 hover:text-church-orange">Home</a>
            <a href="about.html" class="text-2xl font-serif text-gray-800 hover:text-church-orange">About Us</a>
            <a href="leadership.html" class="text-2xl font-serif text-gray-800 hover:text-church-orange">The Bishop</a>
            <a href="books.html" class="text-2xl font-serif text-gray-800 hover:text-church-orange">Library</a>
            <a href="events.html" class="text-2xl font-serif text-gray-800 hover:text-church-orange">Events</a>
            <a href="blog.html" class="text-2xl font-serif text-gray-800 hover:text-church-orange">Blog</a>
            <a href="give.html" class="px-8 py-3 bg-church-orange text-white rounded-full font-bold text-lg mt-4 shadow-lg active:scale-95 transition-transform">Give Now</a>
        </div>
    </nav>

    <div class="relative w-full h-screen flex-grow bg-church-dark overflow-hidden flex flex-col justify-center">
        
        <div class="absolute inset-0 w-full h-full bg-black">
            <img src="https://images.unsplash.com/photo-1438232992991-995b7058bbb3?q=80&w=2073&auto=format&fit=crop" class="hero-slide absolute inset-0 w-full h-full object-cover opacity-100 transition-opacity duration-1000 scale-105" />
            <img src="https://images.unsplash.com/photo-1478147424096-d98f77271e8d?q=80&w=2070&auto=format&fit=crop" class="hero-slide absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-1000 scale-105" />
            <img src="https://images.unsplash.com/photo-1548625361-2dded6d639b9?q=80&w=2070&auto=format&fit=crop" class="hero-slide absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-1000 scale-105" />
            
            <div class="absolute inset-0 bg-gradient-to-r from-church-orange/80 via-church-dark/80 to-transparent mix-blend-multiply z-0"></div>
            <div class="absolute inset-0 bg-gradient-to-t from-church-dark via-church-dark/40 to-transparent z-0"></div>
        </div>

        <div class="relative z-10 w-full container mx-auto px-6 flex flex-col justify-center mt-16 md:mt-20">
            <div class="max-w-2xl text-white animate-fade-in">
                <div class="inline-block px-3 py-1 mb-4 border border-white/30 rounded-full bg-white/10 backdrop-blur-sm text-[10px] md:text-xs tracking-widest uppercase font-semibold">
                    Welcome Home
                </div>
                
                <h1 id="hero-title" class="font-serif text-5xl md:text-6xl lg:text-7xl font-bold leading-tight mb-4 md:mb-6 shadow-sm drop-shadow-lg">
                    Loading...
                </h1>
                
                <p id="hero-subtitle" class="text-lg md:text-2xl text-church-gold font-medium leading-relaxed mb-8 max-w-lg italic">
                </p>
                
                <div class="flex flex-wrap gap-4 relative z-10">
                    <a href="events.html" class="bg-white text-church-orange px-6 py-3 md:px-8 md:py-3 rounded-full font-bold hover:bg-gray-100 transition-all duration-300 shadow-lg hover:shadow-2xl hover:-translate-y-1 text-sm md:text-base">
                        Service Times
                    </a>
                    <a href="about.html" class="bg-transparent border-2 border-white text-white px-6 py-3 md:px-8 md:py-3 rounded-full font-bold hover:bg-white/10 transition-all duration-300 hover:shadow-lg hover:-translate-y-1 text-sm md:text-base">
                        Who We Are
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CMS Text Fetcher
        async function loadHomeData() {
            const titleEl = document.getElementById('hero-title');
            try {
                const cacheBuster = new Date().getTime();
                const response = await fetch('home.json?v=' + cacheBuster);
                
                if (response.ok) {
                    const data = await response.json();
                    
                    if (data.church_name && data.church_name.trim() !== "") {
                        document.getElementById('nav-logo-text').textContent = data.church_name;
                        document.getElementById('page-title').textContent = data.church_name + " - Home";
                    }
                    
                    if (data.main_headline && data.main_headline.trim() !== "") {
                        titleEl.innerHTML = data.main_headline;
                    } else {
                        titleEl.innerHTML = "Welcome Home";
                    }

                    if (data.subheadline) document.getElementById('hero-subtitle').innerHTML = data.subheadline;
                    
                    if (data.announcement && data.announcement.trim() !== "") {
                        document.getElementById('announcement-banner').classList.remove('hidden');
                        let repeatedText = Array(4).fill(data.announcement).join("   •   ") + "   •   ";
                        document.getElementById('announcement-text-1').textContent = repeatedText;
                        document.getElementById('announcement-text-2').textContent = repeatedText;
                        document.getElementById('navbar').classList.replace('top-0', 'top-7');
                    }
                }
            } catch (error) { 
                console.error("Error loading home data:", error); 
                titleEl.innerHTML = "Welcome Home";
            }
        }
        loadHomeData();

        // Hardcoded Hero Slider Engine
        const slides = document.querySelectorAll('.hero-slide');
        let currentSlide = 0;
        setInterval(() => {
            slides[currentSlide].classList.replace('opacity-100', 'opacity-0');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.replace('opacity-0', 'opacity-100');
        }, 5000);

        // Navbar Scroll Logic
        const navbar = document.getElementById('navbar');
        const logoText = document.getElementById('nav-logo-text');
        const navLinks = document.querySelectorAll('.nav-link');
        const navBtn = document.getElementById('nav-btn');
        const mobileBtn = document.getElementById('mobile-menu-btn');

        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                navbar.classList.replace('bg-transparent', 'bg-white/95');
                navbar.classList.add('backdrop-blur-md', 'shadow-sm');
                navbar.classList.replace('py-4', 'py-2');
                logoText.classList.replace('text-white', 'text-gray-900');
                navLinks.forEach(link => link.classList.replace('text-white/90', 'text-gray-700'));
                navBtn.classList.replace('bg-white', 'bg-church-orange');
                navBtn.classList.replace('text-church-orange', 'text-white');
                mobileBtn.classList.replace('text-white', 'text-gray-800');
            } else {
                navbar.classList.replace('bg-white/95', 'bg-transparent');
                navbar.classList.remove('backdrop-blur-md', 'shadow-sm');
                navbar.classList.replace('py-2', 'py-4');
                logoText.classList.replace('text-gray-900', 'text-white');
                navLinks.forEach(link => link.classList.replace('text-gray-700', 'text-white/90'));
                navBtn.classList.replace('bg-church-orange', 'bg-white');
                navBtn.classList.replace('text-white', 'text-church-orange');
                mobileBtn.classList.replace('text-gray-800', 'text-white');
            }
        });

        // Mobile Menu
        const mobileMenu = document.getElementById('mobile-menu');
        const mobileBtnIcon = document.getElementById('menu-icon');
        const closeIcon = document.getElementById('close-icon');

        mobileBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden'); mobileMenu.classList.toggle('flex');
            mobileBtnIcon.classList.toggle('hidden'); closeIcon.classList.toggle('hidden');
            if(!mobileMenu.classList.contains('hidden')){ mobileBtn.classList.replace('text-white', 'text-gray-800'); }
        });
    </script>
</body>
</html>
